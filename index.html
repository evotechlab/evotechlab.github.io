<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>FieldCam O&M</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* CSS Base & Reset (Risolve il problema dei campi che escono dallo schermo) */
    *, *::before, *::after { box-sizing: border-box; }
    
    :root { --primary: #0ea5e9; --success: #10b981; --bg: #f1f5f9; --text: #0f172a; --card: #ffffff; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 30px; }
    
    header { background: #0f172a; color: white; padding: 18px 20px; text-align: center; font-size: 18px; font-weight: 700; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 16px; }
    
    /* Form Layout */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; width: 100%; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
    
    @media (max-width: 380px) {
        /* Su schermi molto stretti, i campi affiancati si incolonnano */
        .form-grid-2 { grid-template-columns: 1fr; }
    }

    label { font-size: 13px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { padding: 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 16px; font-family: inherit; background: #f8fafc; width: 100%; transition: border 0.2s; }
    input:focus, select:focus { outline: none; border-color: var(--primary); background: white; }
    
    /* Foto & Pulsanti */
    .photo-area { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 30px 20px; text-align: center; background: #f8fafc; margin-bottom: 16px; overflow: hidden; position: relative; }
    .photo-area.has-photo { padding: 0; border: none; }
    #photoPreview { width: 100%; display: block; border-radius: 12px; }
    input[type="file"] { display: none; }
    
    .btn { border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
    .btn-camera { background: #334155; color: white; margin-bottom: 12px; }
    .btn-camera:active { background: #1e293b; }
    .btn-submit { background: var(--primary); color: white; font-size: 18px; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
    .btn-submit:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }
    .btn-reset { background: white; color: #ef4444; border: 1px solid #fca5a5; margin-top: 20px; }
    
    /* Feedback & Contatori */
    .session-info { background: #dcfce7; color: #166534; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 16px; border: 1px solid #bbf7d0; display: none; }
    .gps-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 20px; margin-top: 10px; font-weight: 600; }
    .hidden { display: none !important; }

    /* Loader */
    #loaderOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
    .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<header><i class="fa-solid fa-helmet-safety"></i> FieldCam O&M</header>

<div class="container">
    <div id="authCard" class="card" style="text-align: center; margin-top: 40px;">
        <i class="fa-brands fa-dropbox" style="font-size: 48px; color: #0061FE; margin-bottom: 16px;"></i>
        <h3 style="margin-top:0;">Autenticazione</h3>
        <button class="btn btn-submit" onclick="loginDropbox()"><i class="fa-solid fa-lock"></i> Login Dropbox</button>
    </div>

    <div id="appContent" class="hidden">
        
        <div class="card">
            <div class="form-group">
                <label>Nome Operatore</label>
                <input id="operatore" type="text" placeholder="Es. Mario Rossi">
            </div>
            <div class="form-group">
                <label>Nome Impianto (Crea Cartella Principale)</label>
                <input id="impianto" type="text" placeholder="Es. FV Roma Sud">
            </div>
            <div class="form-grid-2">
                <div class="form-group">
                    <label>Potenza (MW)</label>
                    <input id="potenza" type="number" step="0.1" placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>Luogo / Città</label>
                    <input id="luogo" type="text" placeholder="Es. Roma">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Zona Impianto (Crea Sottocartella)</label>
                <select id="zona">
                    <option value="" disabled selected>Seleziona zona...</option>
                    <option value="01_STAZIONE_METEO">01. Stazione Meteo</option>
                    <option value="02_MODULI_FV">02. Moduli FV</option>
                    <option value="03_INVERTER">03. Inverter</option>
                    <option value="04_TRASFORMATORI_MT_BT_AUX">04. Trasformatori MT/BT/AUX</option>
                    <option value="05_LOCALE_MT_BT_AUX">05. Locale MT/BT/AUX</option>
                    <option value="06_UPS_BT_MT">06. UPS BT/MT</option>
                    <option value="07_QUADRI_DI_CAMPO">07. Quadri di Campo</option>
                    <option value="08_CABINA_DI_CONSEGNA">08. Cabina di Consegna</option>
                    <option value="09_STRINGHE">09. Stringhe</option>
                    <option value="10_CABLAGGIO_CC">10. Cablaggio CC</option>
                    <option value="11_SITO">11. Sito / Terreno</option>
                    <option value="12_SISTEMA_DI_SICUREZZA">12. Sistema di Sicurezza</option>
                </select>
            </div>
            <div class="form-group">
                <label>Stato Elemento</label>
                <select id="stato">
                    <option value="" disabled selected>Seleziona stato...</option>
                    <option value="ISPEZIONE">Stato dei fatti / Ispezione</option>
                    <option value="MANUTENZIONE">Manutenzione / Rilascio</option>
                </select>
            </div>
        </div>

        <div id="sessionFeedback" class="session-info">
            <i class="fa-solid fa-check-circle"></i> <span id="photoCountText">0</span> foto salvate in questa cartella.
        </div>

        <div class="card">
            <div class="photo-area" id="photoArea">
                <div id="photoPlaceholder">
                    <i class="fa-solid fa-camera" style="font-size: 40px; color: #94a3b8; margin-bottom: 12px;"></i>
                    <p style="margin: 0; color: #64748b; font-size: 14px;">Inquadra e scatta</p>
                </div>
                <img id="photoPreview" class="hidden">
            </div>
            
            <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(event)">
            
            <button class="btn btn-camera" onclick="document.getElementById('cameraInput').click()">
                <i class="fa-solid fa-camera"></i> Scatta
            </button>
            
            <button id="submitBtn" class="btn btn-submit" onclick="uploadData()" disabled>
                <i class="fa-solid fa-cloud-arrow-up"></i> Invia alla Cartella
            </button>
            
            <div style="text-align: center;">
                <div id="gpsStatus" class="hidden gps-badge"><i class="fa-solid fa-location-dot"></i> GPS Acquisito</div>
            </div>
        </div>

        <button class="btn btn-reset" onclick="hardReset()">
            <i class="fa-solid fa-rotate-right"></i> Cambia Impianto / Azzera tutto
        </button>

    </div>
</div>

<div id="loaderOverlay" class="hidden">
    <div class="spinner"></div>
    <h3 id="loaderText">Caricamento in corso...</h3>
</div>

<script>
/* ================= CONFIG DROPBOX ================= */
const DROPBOX_APP_KEY = "0kimqzc29he9w1u"; 
const REDIRECT_URI = "https://evotechlab.github.io/fieldcam/";
const BASE_FOLDER = "/FieldCam";

let accessToken = localStorage.getItem("db_access");
let photoFile = null;
let gpsData = null;
let sessionUploadedPhotos = 0; // Contatore foto per la sessione attuale

/* ================= AUTENTICAZIONE ================= */
function generateRandomString(length) { let res=''; const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'; for(let i=0;i<length;i++) res+=chars.charAt(Math.floor(Math.random()*chars.length)); return res; }
async function sha256(plain) { const enc=new TextEncoder(); const data=enc.encode(plain); const hash=await crypto.subtle.digest('SHA-256',data); return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }

async function loginDropbox() {
    const codeVerifier = generateRandomString(64); localStorage.setItem("pkce_verifier", codeVerifier);
    const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&code_challenge=${await sha256(codeVerifier)}&code_challenge_method=S256&token_access_type=online&scope=files.metadata.read files.metadata.write files.content.read files.content.write`;
    window.location.href = authUrl;
}

async function handleRedirect() {
    const code = new URLSearchParams(window.location.search).get("code"); if(!code) return;
    const res = await fetch("https://api.dropboxapi.com/oauth2/token", {
        method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ code, grant_type: "authorization_code", client_id: DROPBOX_APP_KEY, redirect_uri: REDIRECT_URI, code_verifier: localStorage.getItem("pkce_verifier") })
    });
    const data = await res.json();
    if(data.access_token) { accessToken = data.access_token; localStorage.setItem("db_access", accessToken); window.history.replaceState({}, document.title, REDIRECT_URI); }
}

async function dropboxFetch(url, options = {}) {
    if(!accessToken) return { status: 401 };
    options.headers = { ...options.headers, "Authorization": "Bearer " + accessToken };
    const res = await fetch(url, options);
    if(res.status === 401) { localStorage.removeItem("db_access"); location.reload(); }
    return res;
}

/* ================= FOTOCAMERA E GPS ================= */
function handlePhoto(event) {
    const file = event.target.files[0];
    if(!file) return;
    photoFile = file;

    document.getElementById('photoPreview').src = URL.createObjectURL(file);
    document.getElementById('photoPreview').classList.remove('hidden');
    document.getElementById('photoPlaceholder').classList.add('hidden');
    document.getElementById('photoArea').classList.add('has-photo');
    document.getElementById('submitBtn').disabled = false;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => { gpsData = { lat: pos.coords.latitude, lng: pos.coords.longitude }; document.getElementById('gpsStatus').classList.remove('hidden'); }, 
            err => { console.warn("GPS non disponibile"); }
        );
    }
}

/* ================= UPLOAD DATI E FOTO NELLE SOTTOCARTELLE ================= */
async function uploadData() {
    const op = document.getElementById('operatore').value.trim();
    const impRaw = document.getElementById('impianto').value.trim();
    const zRaw = document.getElementById('zona').value;
    const s = document.getElementById('stato').value;

    if(!op || !impRaw || !zRaw || !s || !photoFile) {
        alert("Compila tutti i campi obbligatori (Operatore, Impianto, Zona, Stato) e scatta una foto."); return;
    }

    document.getElementById('loaderOverlay').classList.remove('hidden');

    // Crea i nomi delle cartelle in modo sicuro (sostituisce spazi con underscore)
    const impiantoFolder = impRaw.replace(/[^a-zA-Z0-9]/g, '_');
    const zonaFolder = zRaw;
    
    // PERCORSO FINALE DROPBOX: /FieldCam_Reports/Nome_Impianto/Zona_Impianto/
    const targetFolder = `${BASE_FOLDER}/${impiantoFolder}/${zonaFolder}`;
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
    const fileName = `${timestamp}_${s}`;

    try {
        // Upload Foto
        document.getElementById('loaderText').innerText = "Caricamento Foto...";
        await dropboxFetch("https://content.dropboxapi.com/2/files/upload", {
            method: "POST", headers: { "Content-Type": "application/octet-stream", "Dropbox-API-Arg": JSON.stringify({ path: `${targetFolder}/${fileName}.jpg`, mode: "add", autorename: true }) },
            body: photoFile
        });

        // Upload JSON Metadati
        document.getElementById('loaderText').innerText = "Salvataggio Dati...";
        const reportData = { id: timestamp, operatore: op, impianto: impRaw, potenza_mw: document.getElementById('potenza').value, luogo: document.getElementById('luogo').value, zona: zRaw, stato: s, gps: gpsData };
        await dropboxFetch("https://content.dropboxapi.com/2/files/upload", {
            method: "POST", headers: { "Content-Type": "application/octet-stream", "Dropbox-API-Arg": JSON.stringify({ path: `${targetFolder}/${fileName}.json`, mode: "add", autorename: true }) },
            body: JSON.stringify(reportData, null, 2)
        });

        // Completato: RESETTA SOLO LA FOTOCAMERA, LASCIA I CAMPI COMPILATI!
        sessionUploadedPhotos++;
        document.getElementById('photoCountText').innerText = sessionUploadedPhotos;
        document.getElementById('sessionFeedback').style.display = "block";
        
        softResetCamera();
        document.getElementById('loaderOverlay').classList.add('hidden');

    } catch (e) {
        console.error(e);
        document.getElementById('loaderOverlay').classList.add('hidden');
        alert("Errore di caricamento. Riprova.");
    }
}

// Resetta solo l'area foto per permettere scatti multipli
function softResetCamera() {
    photoFile = null;
    document.getElementById('photoPreview').classList.add('hidden');
    document.getElementById('photoPlaceholder').classList.remove('hidden');
    document.getElementById('photoArea').classList.remove('has-photo');
    document.getElementById('cameraInput').value = "";
    document.getElementById('submitBtn').disabled = true;
}

// Resetta tutto se cambia impianto
function hardReset() {
    if(!confirm("Vuoi cancellare tutti i dati inseriti e ricominciare?")) return;
    document.querySelectorAll('input').forEach(i => i.value = "");
    document.querySelectorAll('select').forEach(s => s.value = "");
    sessionUploadedPhotos = 0;
    document.getElementById('sessionFeedback').style.display = "none";
    document.getElementById('gpsStatus').classList.add('hidden');
    gpsData = null;
    softResetCamera();
    window.scrollTo(0,0);
}

/* ================= INIT ================= */
(async () => {
    await handleRedirect();
    if(accessToken) {
        document.getElementById("authCard").classList.add("hidden");
        document.getElementById("appContent").classList.remove("hidden");
    }
})();
</script>

</body>
</html>
