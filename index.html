<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>FieldCam O&M Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* CSS Base Mobile-First */
    :root { --primary: #0ea5e9; --success: #10b981; --bg: #f1f5f9; --text: #0f172a; --card: #ffffff; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 20px; }
    
    /* Header stile App */
    header { background: #0f172a; color: white; padding: 18px 20px; text-align: center; font-size: 18px; font-weight: 700; position: sticky; top: 0; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    
    .container { padding: 16px; max-width: 600px; margin: 0 auto; }
    .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 16px; }
    
    /* Form Elements (Grandi per uso touch) */
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select { padding: 14px; border-radius: 10px; border: 1px solid #cbd5e1; font-size: 16px; font-family: inherit; background: #f8fafc; transition: border 0.2s; }
    input:focus, select:focus { outline: none; border-color: var(--primary); background: white; }
    
    /* Area Foto / Fotocamera */
    .photo-area { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 30px 20px; text-align: center; background: #f8fafc; position: relative; margin-bottom: 20px; overflow: hidden; }
    .photo-area.has-photo { padding: 0; border: none; }
    #photoPreview { width: 100%; display: block; border-radius: 12px; }
    .camera-btn { background: #334155; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
    .camera-btn:active { background: #1e293b; }
    
    /* Pulsante nascosto per l'input file nativo */
    input[type="file"] { display: none; }
    
    /* Bottone Invio */
    .submit-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); transition: background 0.2s; }
    .submit-btn:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }
    
    /* Utils */
    .hidden { display: none !important; }
    .gps-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 20px; margin-top: 10px; font-weight: 600; }
    
    /* Overlay Caricamento */
    #loaderOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
    .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid var(--primary); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<header><i class="fa-solid fa-helmet-safety"></i> FieldCam O&M</header>

<div class="container">
    <div id="authCard" class="card" style="text-align: center; margin-top: 40px;">
        <i class="fa-brands fa-dropbox" style="font-size: 48px; color: #0061FE; margin-bottom: 16px;"></i>
        <h3 style="margin-top:0;">Autenticazione O&M</h3>
        <p style="font-size: 14px; color: #64748b; margin-bottom: 24px;">Effettua l'accesso per caricare i report fotografici dal campo.</p>
        <button class="submit-btn" onclick="loginDropbox()"><i class="fa-solid fa-lock"></i> Login Aziendale</button>
    </div>

    <div id="appContent" class="hidden">
        
        <div class="card">
            <div class="form-group">
                <label>Nome Operatore</label>
                <input id="operatore" type="text" placeholder="Es. Mario Rossi">
            </div>
            <div class="form-group">
                <label>Nome Impianto</label>
                <input id="impianto" type="text" placeholder="Es. FV Roma Sud">
            </div>
            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><label>Potenza (MW)</label><input id="potenza" type="number" step="0.1" placeholder="0.0"></div>
                <div><label>Luogo</label><input id="luogo" type="text" placeholder="Città/Zona"></div>
            </div>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Zona Impianto</label>
                <select id="zona">
                    <option value="" disabled selected>Seleziona zona...</option>
                    <option value="01_STAZIONE_METEO">01. Stazione Meteo</option>
                    <option value="02_MODULI_FV">02. Moduli FV</option>
                    <option value="03_INVERTER">03. Inverter</option>
                    <option value="04_TRASFORMATORI_MT_BT_AUX">04. Trasformatori MT/BT/AUX</option>
                    <option value="05_LOCALE_MT_BT_AUX">05. Locale MT/BT/AUX</option>
                    <option value="06_UPS_BT_MT">06. UPS BT/MT</option>
                    <option value="07_QUADRI_DI_CAMPO">07. Quadri di Campo</option>
                    <option value="08_CABINA_DI_CONSEGNA">08. Cabina di Consegna</option>
                    <option value="09_STRINGHE">09. Stringhe</option>
                    <option value="10_CABLAGGIO_CC">10. Cablaggio CC</option>
                    <option value="11_SITO">11. Sito / Terreno</option>
                    <option value="12_SISTEMA_DI_SICUREZZA">12. Sistema di Sicurezza</option>
                </select>
            </div>
            <div class="form-group">
                <label>Stato</label>
                <select id="stato">
                    <option value="" disabled selected>Seleziona stato...</option>
                    <option value="STATO_DEI_FATTI_ISPEZIONE">Stato dei fatti / Ispezione</option>
                    <option value="MANUTENZIONE_RILASCIO">Manutenzione / Rilascio</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="photo-area" id="photoArea">
                <div id="photoPlaceholder">
                    <i class="fa-solid fa-camera" style="font-size: 40px; color: #94a3b8; margin-bottom: 12px;"></i>
                    <p style="margin: 0; color: #64748b; font-size: 14px;">Nessuna foto scattata</p>
                </div>
                <img id="photoPreview" class="hidden">
            </div>
            
            <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(event)">
            <button class="camera-btn" onclick="document.getElementById('cameraInput').click()">
                <i class="fa-solid fa-camera"></i> Scatta Fotografia
            </button>
            <div id="gpsStatus" class="hidden gps-badge"><i class="fa-solid fa-location-dot"></i> GPS Acquisito</div>
        </div>

        <button id="submitBtn" class="submit-btn" onclick="uploadData()" disabled>
            <i class="fa-solid fa-paper-plane"></i> Invia Report
        </button>

    </div>
</div>

<div id="loaderOverlay" class="hidden">
    <div class="spinner"></div>
    <h3 id="loaderText">Caricamento Foto...</h3>
</div>

<script>
/* ================= CONFIG DROPBOX ================= */
// USA LA TUA APP KEY QUI!
const DROPBOX_APP_KEY = "0kimqzc29he9w1u"; 
const REDIRECT_URI = "https://evotechlab.github.io/fieldcam/"; // Sostituisci se l'URL è diverso
const DROPBOX_FOLDER = "/FieldCam";

let accessToken = localStorage.getItem("db_access");
let photoFile = null;
let gpsData = null;

/* ================= AUTENTICAZIONE ================= */
function generateRandomString(length) { let result = ''; const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'; for (let i=0; i<length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length)); return result; }
async function sha256(plain) { const encoder = new TextEncoder(); const data = encoder.encode(plain); const hash = await crypto.subtle.digest('SHA-256', data); return btoa(String.fromCharCode(...new Uint8Array(hash))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''); }

async function loginDropbox() {
    const codeVerifier = generateRandomString(64);
    localStorage.setItem("pkce_verifier", codeVerifier);
    const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&code_challenge=${await sha256(codeVerifier)}&code_challenge_method=S256&token_access_type=online&scope=files.metadata.read files.metadata.write files.content.read files.content.write`;
    window.location.href = authUrl;
}

async function handleRedirect() {
    const code = new URLSearchParams(window.location.search).get("code");
    if(!code) return;
    const response = await fetch("https://api.dropboxapi.com/oauth2/token", {
        method: "POST", headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ code, grant_type: "authorization_code", client_id: DROPBOX_APP_KEY, redirect_uri: REDIRECT_URI, code_verifier: localStorage.getItem("pkce_verifier") })
    });
    const data = await response.json();
    if(data.access_token) {
        accessToken = data.access_token;
        localStorage.setItem("db_access", accessToken);
        window.history.replaceState({}, document.title, REDIRECT_URI);
    }
}

async function dropboxFetch(url, options = {}) {
    if(!accessToken) return { status: 401 };
    options.headers = { ...options.headers, "Authorization": "Bearer " + accessToken };
    const res = await fetch(url, options);
    if(res.status === 401) { localStorage.removeItem("db_access"); location.reload(); }
    return res;
}

/* ================= FOTOCAMERA E GPS ================= */
function handlePhoto(event) {
    const file = event.target.files[0];
    if(!file) return;
    photoFile = file;

    // Anteprima Foto
    const preview = document.getElementById('photoPreview');
    const area = document.getElementById('photoArea');
    preview.src = URL.createObjectURL(file);
    preview.classList.remove('hidden');
    document.getElementById('photoPlaceholder').classList.add('hidden');
    area.classList.add('has-photo');

    // Sblocca bottone
    document.getElementById('submitBtn').disabled = false;

    // Cattura GPS in Background
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => {
                gpsData = { lat: pos.coords.latitude, lng: pos.coords.longitude, precision_m: Math.round(pos.coords.accuracy) };
                document.getElementById('gpsStatus').classList.remove('hidden');
            }, 
            err => { console.warn("GPS negato o non disponibile"); }
        );
    }
}

/* ================= UPLOAD DATI & FOTO ================= */
async function uploadData() {
    // Validazione base
    const op = document.getElementById('operatore').value.trim();
    const imp = document.getElementById('impianto').value.trim();
    const z = document.getElementById('zona').value;
    const s = document.getElementById('stato').value;

    if(!op || !imp || !z || !s || !photoFile) {
        alert("Compila i campi obbligatori (Operatore, Impianto, Zona, Stato) e scatta una foto.");
        return;
    }

    // UI Loading
    document.getElementById('loaderOverlay').classList.remove('hidden');

    // Crea un ID base timestamp univoco
    const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
    const safeImpianto = imp.replace(/[^a-zA-Z0-9]/g, '_');
    const baseFileName = `${DROPBOX_FOLDER}/${timestamp}_${safeImpianto}_${z}`;

    try {
        // 1. UPLOAD IMMAGINE
        document.getElementById('loaderText').innerText = "Caricamento Foto in corso...";
        await dropboxFetch("https://content.dropboxapi.com/2/files/upload", {
            method: "POST",
            headers: {
                "Content-Type": "application/octet-stream",
                "Dropbox-API-Arg": JSON.stringify({ path: `${baseFileName}.jpg`, mode: "add", autorename: true })
            },
            body: photoFile
        });

        // 2. UPLOAD METADATI JSON
        document.getElementById('loaderText').innerText = "Salvataggio Metadati...";
        const reportData = {
            id_report: timestamp, data_ora: new Date().toISOString(),
            operatore: op, impianto: imp, potenza_mw: document.getElementById('potenza').value,
            luogo: document.getElementById('luogo').value, zona: z, stato: s, gps: gpsData
        };

        await dropboxFetch("https://content.dropboxapi.com/2/files/upload", {
            method: "POST",
            headers: {
                "Content-Type": "application/octet-stream",
                "Dropbox-API-Arg": JSON.stringify({ path: `${baseFileName}.json`, mode: "add", autorename: true })
            },
            body: JSON.stringify(reportData, null, 2)
        });

        // 3. SUCCESSO
        document.getElementById('loaderOverlay').classList.add('hidden');
        alert("✅ Report e Foto inviati con successo!");
        resetForm();

    } catch (e) {
        console.error(e);
        document.getElementById('loaderOverlay').classList.add('hidden');
        alert("❌ Errore durante l'invio. Controlla la connessione internet.");
    }
}

function resetForm() {
    document.getElementById('zona').value = "";
    document.getElementById('stato').value = "";
    photoFile = null; gpsData = null;
    
    document.getElementById('photoPreview').classList.add('hidden');
    document.getElementById('photoPlaceholder').classList.remove('hidden');
    document.getElementById('photoArea').classList.remove('has-photo');
    document.getElementById('gpsStatus').classList.add('hidden');
    document.getElementById('cameraInput').value = "";
    document.getElementById('submitBtn').disabled = true;
    window.scrollTo(0,0);
}

/* ================= INIT ================= */
(async () => {
    await handleRedirect();
    if(accessToken) {
        document.getElementById("authCard").classList.add("hidden");
        document.getElementById("appContent").classList.remove("hidden");
        
        // Crea cartella se non esiste
        dropboxFetch("https://api.dropboxapi.com/2/files/create_folder_v2", {
            method: "POST", headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ path: DROPBOX_FOLDER })
        }).catch(e=>{}); // Ignora se esiste già
    }
})();
</script>

</body>
</html>
